services:
  - type: web
    name: govil-scraper
    runtime: docker
    plan: starter
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "5000"
      - key: TEMP_DIR
        value: /tmp/govil_scraper
      - key: DISABLE_PLAYWRIGHT
        value: "1"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: WORKER_API_KEY
        generateValue: true
    disk:
      name: scraper-data
      mountPath: /tmp/govil_scraper
      sizeGB: 1

  - type: worker
    name: over-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: python over_worker.py
    envVars:
      - key: DISABLE_PLAYWRIGHT
        value: "1"
      - key: OVER_API_KEY
        sync: false
