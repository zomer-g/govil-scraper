services:
  - type: web
    name: govil-scraper
    runtime: docker
    plan: starter
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "5000"
      - key: TEMP_DIR
        value: /var/data/govil_scraper
      - key: DISABLE_PLAYWRIGHT
        value: "1"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: WORKER_API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: govil-scraper-db
          property: connectionString
    disk:
      name: scraper-data
      mountPath: /var/data/govil_scraper
      sizeGB: 5

databases:
  - name: govil-scraper-db
    plan: free
    databaseName: govil_scraper
    user: govil_scraper
