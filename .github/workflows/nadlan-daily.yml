name: Nadlan daily trigger

# Free GitHub-hosted cron — pings the public, rate-limited trigger endpoint
# on Render. The endpoint records the event; the actual ~3-hour scrape runs
# on the local worker machine (which polls OVER for tasks).
#
# No secrets needed. The trigger URL is public and the endpoint is
# intentionally unauthenticated (idempotent ring buffer + per-IP rate limit).
# To target a different deployment, edit TRIGGER_URL below.
#
# Manual run: Actions tab → "Nadlan daily trigger" → "Run workflow".

on:
  schedule:
    # 03:00 UTC daily (06:00 Israel winter / 06:00 summer)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note to attach to the trigger event'
        required: false
        default: 'manual run from GitHub UI'

env:
  TRIGGER_URL: https://govil-scraper.onrender.com/api/nadlan/notify-trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST trigger to Render
        env:
          NOTE: ${{ github.event.inputs.note || 'scheduled daily run' }}
        run: |
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"source\":\"github-actions\",\"note\":\"$NOTE\"}" \
            "$TRIGGER_URL"
          echo
          echo "Trigger sent to $TRIGGER_URL"
